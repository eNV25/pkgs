name: Check for package updates with nvcheck

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  nvchecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: just fd-find
      - uses: astral-sh/setup-uv@v8.2.0
      - run: |
          mkdir -p ~/.config/nvchecker/
          cat <<'EOF' > ~/.config/nvchecker/keyfile.toml
          [keys]
          github = "${{ github.token }}"
          "codeberg.org" = "${{ secrets.CODEBERG_TOKEN }}"
          EOF
          uv tool install nvchecker --with pyalpm
          just nvcheck > "${{ runner.temp }}"/nvcheck.output
          just nvtake --all
      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          branch: "updates"
          title: "Updates"
          commit-message: "Update versions.json"
          body-path: "${{ runner.temp }}/nvcheck.output"
          add-paths: versions.json